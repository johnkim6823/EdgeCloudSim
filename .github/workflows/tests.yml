name: Tests

"on":
  push:
  pull_request:

jobs:
  resaco-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ReSACO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: ReSACO/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  scripts-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r requirements.txt pytest==8.3.5
      - run: pytest tests/ -v
